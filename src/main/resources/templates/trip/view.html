<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chi tiết kế hoạch</title>
    <th:block th:insert="~{layout/layout::library}"/>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #87cefa, #b0e0e6);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px 0;
        }

        .card {
            border-radius: 20px;
            padding: 25px;
            background: #fff;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        h4 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
        }

        p {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #555;
            display: flex;
            align-items: center;
        }

        p i {
            margin-right: 10px;
            color: #4e73df;
            width: 25px;
            text-align: center;
        }

        p span {
            margin-left: 10px;
            font-weight: 600;
            color: #1f2937;
        }

        .btn-danger {
            background: linear-gradient(45deg, #e74a3b, #c0392b);
            border: none;
            border-radius: 12px;
            padding: 10px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        @media (max-width: 768px) {
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="container mt-3">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6">

            <div class="card">
                <h4><i class="fa-solid fa-info-circle"></i> Thông tin kế hoạch</h4>

                <p><i class="fa-solid fa-tag"></i> Loại: <span th:text="${trip.category.name}"></span></p>
                <p><i class="fa-solid fa-utensils"></i> Tên món/địa danh: <span th:text="${trip.name}"></span></p>
                <p><i class="fa-solid fa-money-bill-wave"></i> Giá: <span th:text="${trip.price} + ' 🐟'"></span></p>
                <p><i class="fa-solid fa-location-dot"></i> Địa điểm: <span th:text="${trip.location}"></span></p>
                <p><i class="fa-solid fa-arrow-right-long"></i> Xuất phát: <span th:text="${trip.startTime}"></span></p>
                <p><i class="fa-solid fa-flag-checkered"></i> Kết thúc: <span th:text="${trip.endTime}"></span></p>

                <a class="btn btn-danger w-100 mt-3" href="/trips">Quay lại</a>
            </div>

        </div>
    </div>
</div>
</body>
</html>
