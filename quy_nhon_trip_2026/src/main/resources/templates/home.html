<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ</title>
    <link href="https://cdn.jsdelivr.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        .bg-img {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .bg-img img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* giữ tỉ lệ ảnh, không bị cắt */
        }
        .btn-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
<div class="bg-img">
    <img src="/images/1b57e861-cba6-4289-a0ec-f06fdf7a5a80.jpeg" alt="Background">
    <a href="/trips" class="btn btn-success btn-center">Vào trang quản lý</a>
</div>
</body>
</html>
